<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { fill: #e2e8f0; font-size: 16px; font-weight: 700; }
    .level { fill: #e2e8f0; font-size: 13px; font-weight: 700; }
    .desc { fill: #94a3b8; font-size: 9.5px; }
    .sublabel { fill: #94a3b8; font-size: 10px; }
  </style>

  <text x="300" y="25" text-anchor="middle" class="title">The Tilt Spectrum</text>

  <!-- Gradient bar -->
  <defs>
    <linearGradient id="tiltGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22c55e"/>
      <stop offset="35%" stop-color="#facc15"/>
      <stop offset="65%" stop-color="#f97316"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
  </defs>
  <rect x="40" y="45" width="520" height="12" rx="6" fill="url(#tiltGrad)" opacity="0.6"/>

  <!-- Markers -->
  <!-- Calm -->
  <line x1="80" y1="45" x2="80" y2="65" stroke="#22c55e" stroke-width="2"/>
  <circle cx="80" cy="45" r="5" fill="#22c55e"/>
  <text x="80" y="82" text-anchor="middle" class="level" style="fill: #22c55e;">Calm</text>
  <text x="80" y="96" text-anchor="middle" class="desc">Clear thinking</text>
  <text x="80" y="108" text-anchor="middle" class="desc">Following rules</text>

  <!-- Micro-tilt -->
  <line x1="220" y1="45" x2="220" y2="65" stroke="#facc15" stroke-width="2"/>
  <circle cx="220" cy="45" r="5" fill="#facc15"/>
  <text x="220" y="82" text-anchor="middle" class="level" style="fill: #facc15;">Micro-Tilt</text>
  <text x="220" y="96" text-anchor="middle" class="desc">Slight impatience</text>
  <text x="220" y="108" text-anchor="middle" class="desc">Skipping checklist</text>

  <!-- Moderate tilt -->
  <line x1="380" y1="45" x2="380" y2="65" stroke="#f97316" stroke-width="2"/>
  <circle cx="380" cy="45" r="5" fill="#f97316"/>
  <text x="380" y="82" text-anchor="middle" class="level" style="fill: #f97316;">Moderate Tilt</text>
  <text x="380" y="96" text-anchor="middle" class="desc">Oversizing positions</text>
  <text x="380" y="108" text-anchor="middle" class="desc">Emotional entries</text>

  <!-- Full tilt -->
  <line x1="520" y1="45" x2="520" y2="65" stroke="#ef4444" stroke-width="2"/>
  <circle cx="520" cy="45" r="5" fill="#ef4444"/>
  <text x="520" y="82" text-anchor="middle" class="level" style="fill: #ef4444;">Full Tilt</text>
  <text x="520" y="96" text-anchor="middle" class="desc">Revenge trading</text>
  <text x="520" y="108" text-anchor="middle" class="desc">Account destruction</text>

  <!-- Action labels -->
  <rect x="40" y="130" width="160" height="30" rx="8" fill="#22c55e" opacity="0.08" stroke="#22c55e" stroke-width="1" opacity="0.3"/>
  <text x="120" y="150" text-anchor="middle" class="desc" style="fill: #22c55e;">Trade normally</text>

  <rect x="220" y="130" width="160" height="30" rx="8" fill="#facc15" opacity="0.08" stroke="#facc15" stroke-width="1" opacity="0.3"/>
  <text x="300" y="150" text-anchor="middle" class="desc" style="fill: #facc15;">5-min pause + breathe</text>

  <rect x="400" y="130" width="160" height="30" rx="8" fill="#ef4444" opacity="0.08" stroke="#ef4444" stroke-width="1" opacity="0.3"/>
  <text x="480" y="150" text-anchor="middle" class="desc" style="fill: #ef4444;">STOP — walk away</text>

  <text x="300" y="190" text-anchor="middle" class="sublabel">Catch yourself at micro-tilt. By moderate tilt, your rational brain is already losing control.</text>
</svg>
