<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { fill: #e2e8f0; font-size: 16px; font-weight: 700; }
    .formula { fill: #00b4d8; font-size: 18px; font-weight: 700; }
    .label { fill: #e2e8f0; font-size: 12px; font-weight: 600; }
    .value { fill: #e2e8f0; font-size: 14px; font-weight: 700; }
    .sublabel { fill: #94a3b8; font-size: 10px; }
    .example { fill: #94a3b8; font-size: 11px; }
  </style>

  <text x="300" y="28" text-anchor="middle" class="title">Position Sizing Formula</text>

  <!-- Formula box -->
  <rect x="80" y="50" width="440" height="60" rx="16" fill="#00b4d8" opacity="0.08" stroke="#00b4d8" stroke-width="1.5" opacity="0.3"/>
  <text x="300" y="88" text-anchor="middle" class="formula">Position Size = (Account x Risk%) / Risk Per Unit</text>

  <!-- Example -->
  <rect x="40" y="135" width="520" height="160" rx="16" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="300" y="160" text-anchor="middle" class="label">Example Calculation</text>

  <!-- Variables -->
  <g transform="translate(70, 175)">
    <rect x="0" y="0" width="120" height="40" rx="8" fill="#334155"/>
    <text x="60" y="17" text-anchor="middle" class="sublabel">Account</text>
    <text x="60" y="33" text-anchor="middle" class="value">$10,000</text>
  </g>

  <text x="205" y="200" text-anchor="middle" class="formula" style="font-size: 20px;">x</text>

  <g transform="translate(220, 175)">
    <rect x="0" y="0" width="80" height="40" rx="8" fill="#334155"/>
    <text x="40" y="17" text-anchor="middle" class="sublabel">Risk %</text>
    <text x="40" y="33" text-anchor="middle" class="value" style="fill: #ef4444;">1%</text>
  </g>

  <text x="320" y="200" text-anchor="middle" class="formula" style="font-size: 20px;">=</text>

  <g transform="translate(340, 175)">
    <rect x="0" y="0" width="90" height="40" rx="8" fill="#ef4444" opacity="0.15"/>
    <text x="45" y="17" text-anchor="middle" class="sublabel">$ at Risk</text>
    <text x="45" y="33" text-anchor="middle" class="value" style="fill: #ef4444;">$100</text>
  </g>

  <text x="450" y="200" text-anchor="middle" class="formula" style="font-size: 20px;">÷</text>

  <g transform="translate(465, 175)">
    <rect x="0" y="0" width="80" height="40" rx="8" fill="#334155"/>
    <text x="40" y="17" text-anchor="middle" class="sublabel">Risk/Unit</text>
    <text x="40" y="33" text-anchor="middle" class="value">$5</text>
  </g>

  <!-- Result -->
  <g transform="translate(180, 240)">
    <rect x="0" y="0" width="240" height="40" rx="10" fill="#22c55e" opacity="0.1" stroke="#22c55e" stroke-width="1.5"/>
    <text x="120" y="17" text-anchor="middle" class="sublabel" style="fill: #22c55e;">Position Size</text>
    <text x="120" y="33" text-anchor="middle" class="value" style="fill: #22c55e; font-size: 16px;">20 shares = $1,000</text>
  </g>

  <!-- Bottom note -->
  <text x="300" y="315" text-anchor="middle" class="sublabel">Your stop loss determines position size, not your confidence level.</text>
</svg>
