<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .title { fill: #e2e8f0; font-size: 16px; font-weight: 700; }
    .label { fill: #e2e8f0; font-size: 11px; font-weight: 600; }
    .sublabel { fill: #94a3b8; font-size: 10px; }
    .value { fill: #e2e8f0; font-size: 13px; font-weight: 700; }
  </style>

  <text x="300" y="28" text-anchor="middle" class="title">Drawdown Recovery: The Asymmetric Math</text>
  <text x="300" y="48" text-anchor="middle" class="sublabel">Why preventing losses matters more than chasing gains</text>

  <!-- Headers -->
  <rect x="40" y="65" width="520" height="30" rx="8" fill="#334155" opacity="0.5"/>
  <text x="130" y="85" text-anchor="middle" class="label">Loss</text>
  <text x="300" y="85" text-anchor="middle" class="label">Recovery Needed</text>
  <text x="470" y="85" text-anchor="middle" class="label">Difficulty</text>

  <!-- Rows -->
  <!-- 10% -->
  <text x="130" y="120" text-anchor="middle" class="value">-10%</text>
  <text x="300" y="120" text-anchor="middle" class="value" style="fill: #22c55e;">+11.1%</text>
  <rect x="400" y="108" width="60" height="16" rx="8" fill="#22c55e" opacity="0.15"/>
  <text x="430" y="120" text-anchor="middle" class="sublabel" style="fill: #22c55e;">Easy</text>

  <!-- 25% -->
  <text x="130" y="155" text-anchor="middle" class="value">-25%</text>
  <text x="300" y="155" text-anchor="middle" class="value" style="fill: #facc15;">+33.3%</text>
  <rect x="400" y="143" width="80" height="16" rx="8" fill="#facc15" opacity="0.15"/>
  <text x="440" y="155" text-anchor="middle" class="sublabel" style="fill: #facc15;">Moderate</text>

  <!-- 50% -->
  <text x="130" y="190" text-anchor="middle" class="value">-50%</text>
  <text x="300" y="190" text-anchor="middle" class="value" style="fill: #f97316;">+100%</text>
  <rect x="400" y="178" width="100" height="16" rx="8" fill="#f97316" opacity="0.15"/>
  <text x="450" y="190" text-anchor="middle" class="sublabel" style="fill: #f97316;">Very Hard</text>

  <!-- 75% -->
  <text x="130" y="225" text-anchor="middle" class="value">-75%</text>
  <text x="300" y="225" text-anchor="middle" class="value" style="fill: #ef4444;">+300%</text>
  <rect x="400" y="213" width="130" height="16" rx="8" fill="#ef4444" opacity="0.15"/>
  <text x="465" y="225" text-anchor="middle" class="sublabel" style="fill: #ef4444;">Nearly Impossible</text>

  <!-- 90% -->
  <text x="130" y="260" text-anchor="middle" class="value">-90%</text>
  <text x="300" y="260" text-anchor="middle" class="value" style="fill: #ef4444;">+900%</text>
  <rect x="400" y="248" width="150" height="16" rx="8" fill="#ef4444" opacity="0.2"/>
  <text x="475" y="260" text-anchor="middle" class="sublabel" style="fill: #ef4444;">Game Over</text>

  <!-- Bottom insight -->
  <rect x="40" y="285" width="520" height="40" rx="12" fill="#ef4444" opacity="0.06" stroke="#ef4444" stroke-width="1" opacity="0.2"/>
  <text x="300" y="305" text-anchor="middle" class="sublabel" style="fill: #ef4444;">Past 20%, every additional % of drawdown becomes exponentially harder to recover.</text>
  <text x="300" y="318" text-anchor="middle" class="sublabel">This is why risk management is the #1 priority — not finding the perfect entry.</text>
</svg>
