<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 500" fill="none">
  <style>
    text { font-family: system-ui, -apple-system, sans-serif; }
    .label { fill: #e2e8f0; font-size: 11px; font-weight: 600; }
    .sublabel { fill: #94a3b8; font-size: 9px; }
    .title { fill: #e2e8f0; font-size: 16px; font-weight: 700; }
    .phase-dot { stroke-width: 2; }
  </style>

  <!-- Title -->
  <text x="300" y="30" text-anchor="middle" class="title">The Emotional Cycle of Markets</text>

  <!-- Cycle path -->
  <path d="M 300 70 C 420 70, 520 140, 520 220 C 520 300, 460 380, 370 420 C 300 450, 200 450, 150 400 C 80 340, 60 260, 80 200 C 100 130, 180 70, 300 70" stroke="#334155" stroke-width="3" fill="none" stroke-dasharray="8 4"/>

  <!-- Price curve overlay (rises then falls) -->
  <path d="M 100 350 C 140 340, 180 310, 220 270 C 260 230, 300 160, 340 110 C 370 80, 400 75, 420 85 C 450 100, 470 150, 480 200 C 490 250, 500 310, 510 360 C 515 380, 520 400, 520 410" stroke="#00b4d8" stroke-width="2.5" fill="none" opacity="0.4"/>

  <!-- Phase markers with colors -->
  <!-- Disbelief -->
  <circle cx="120" cy="350" r="8" fill="#64748b" class="phase-dot" stroke="#94a3b8"/>
  <text x="120" y="375" text-anchor="middle" class="label">Disbelief</text>
  <text x="120" y="388" text-anchor="middle" class="sublabel">"It won't last"</text>

  <!-- Hope -->
  <circle cx="180" cy="280" r="8" fill="#38bdf8" class="phase-dot" stroke="#7dd3fc"/>
  <text x="180" y="268" text-anchor="middle" class="label">Hope</text>
  <text x="180" y="256" text-anchor="middle" class="sublabel">"Maybe it's real"</text>

  <!-- Optimism -->
  <circle cx="240" cy="210" r="8" fill="#34d399" class="phase-dot" stroke="#6ee7b7"/>
  <text x="240" y="198" text-anchor="middle" class="label">Optimism</text>

  <!-- Excitement -->
  <circle cx="310" cy="130" r="8" fill="#a78bfa" class="phase-dot" stroke="#c4b5fd"/>
  <text x="310" y="118" text-anchor="middle" class="label">Excitement</text>

  <!-- EUPHORIA (peak) -->
  <circle cx="380" cy="85" r="12" fill="#f43f5e" class="phase-dot" stroke="#fb7185"/>
  <text x="380" y="68" text-anchor="middle" class="label" style="fill: #f43f5e; font-size: 13px;">EUPHORIA</text>
  <text x="380" y="55" text-anchor="middle" class="sublabel" style="fill: #fb7185;">Maximum Risk</text>

  <!-- Anxiety -->
  <circle cx="440" cy="140" r="8" fill="#fb923c" class="phase-dot" stroke="#fdba74"/>
  <text x="460" y="128" text-anchor="start" class="label">Anxiety</text>

  <!-- Denial -->
  <circle cx="475" cy="210" r="8" fill="#f97316" class="phase-dot" stroke="#fdba74"/>
  <text x="495" y="205" text-anchor="start" class="label">Denial</text>

  <!-- Fear -->
  <circle cx="495" cy="290" r="8" fill="#ef4444" class="phase-dot" stroke="#fca5a5"/>
  <text x="515" y="288" text-anchor="start" class="label">Fear</text>

  <!-- DESPAIR (bottom) -->
  <circle cx="490" cy="380" r="12" fill="#22c55e" class="phase-dot" stroke="#4ade80"/>
  <text x="490" y="405" text-anchor="middle" class="label" style="fill: #22c55e; font-size: 13px;">DESPAIR</text>
  <text x="490" y="420" text-anchor="middle" class="sublabel" style="fill: #4ade80;">Maximum Opportunity</text>

  <!-- Depression -->
  <circle cx="400" cy="430" r="8" fill="#64748b" class="phase-dot" stroke="#94a3b8"/>
  <text x="400" y="455" text-anchor="middle" class="label">Depression</text>

  <!-- Arrows showing "Smart money sells" and "Smart money buys" -->
  <text x="380" y="470" text-anchor="middle" class="sublabel" style="fill: #00b4d8;">↑ Smart money buys here</text>
  <text x="380" y="42" text-anchor="middle" class="sublabel" style="fill: #f43f5e;">↓ Smart money sells here</text>
</svg>
